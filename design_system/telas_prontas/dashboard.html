<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SalesPro CRM</title>

    <!-- Design System: variables.css is the generated output (layer 3) -->
    <link href="../generated/variables.css" rel="stylesheet" />

    <!-- Font: loaded from the primitive font.family.sans token (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icons: Lucide (per CONTRACT.md — Lucide only) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CDN configured with semantic token names -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: {
                            base:    "rgb(var(--ds-surface-base) / <alpha-value>)",
                            raised:  "rgb(var(--ds-surface-raised) / <alpha-value>)",
                            sunken:  "rgb(var(--ds-surface-sunken) / <alpha-value>)",
                            overlay: "rgb(var(--ds-surface-overlay) / <alpha-value>)",
                            inverse: "rgb(var(--ds-surface-inverse) / <alpha-value>)",
                        },
                        text: {
                            primary:   "rgb(var(--ds-text-primary) / <alpha-value>)",
                            secondary: "rgb(var(--ds-text-secondary) / <alpha-value>)",
                            muted:     "rgb(var(--ds-text-muted) / <alpha-value>)",
                            inverse:   "rgb(var(--ds-text-inverse) / <alpha-value>)",
                            link:      "rgb(var(--ds-text-link) / <alpha-value>)",
                            disabled:  "rgb(var(--ds-text-disabled) / <alpha-value>)",
                        },
                        border: {
                            DEFAULT: "rgb(var(--ds-border-default) / <alpha-value>)",
                            strong:  "rgb(var(--ds-border-strong) / <alpha-value>)",
                            subtle:  "rgb(var(--ds-border-subtle) / <alpha-value>)",
                            focus:   "rgb(var(--ds-border-focus) / <alpha-value>)",
                        },
                        action: {
                            primary: {
                                DEFAULT: "rgb(var(--ds-action-primary-bg) / <alpha-value>)",
                                hover:   "rgb(var(--ds-action-primary-bg-hover) / <alpha-value>)",
                                active:  "rgb(var(--ds-action-primary-bg-active) / <alpha-value>)",
                                fg:      "rgb(var(--ds-action-primary-fg) / <alpha-value>)",
                            },
                            secondary: {
                                DEFAULT: "rgb(var(--ds-action-secondary-bg) / <alpha-value>)",
                                hover:   "rgb(var(--ds-action-secondary-bg-hover) / <alpha-value>)",
                                fg:      "rgb(var(--ds-action-secondary-fg) / <alpha-value>)",
                                border:  "rgb(var(--ds-action-secondary-border) / <alpha-value>)",
                            },
                            ghost: {
                                hover:  "rgb(var(--ds-action-ghost-bg-hover) / <alpha-value>)",
                                active: "rgb(var(--ds-action-ghost-bg-active) / <alpha-value>)",
                                fg:     "rgb(var(--ds-action-ghost-fg) / <alpha-value>)",
                            },
                            danger: {
                                DEFAULT: "rgb(var(--ds-action-danger-bg) / <alpha-value>)",
                                hover:   "rgb(var(--ds-action-danger-bg-hover) / <alpha-value>)",
                                fg:      "rgb(var(--ds-action-danger-fg) / <alpha-value>)",
                            },
                        },
                        field: {
                            DEFAULT:       "rgb(var(--ds-field-bg) / <alpha-value>)",
                            fg:            "rgb(var(--ds-field-fg) / <alpha-value>)",
                            placeholder:   "rgb(var(--ds-field-placeholder) / <alpha-value>)",
                            border:        "rgb(var(--ds-field-border) / <alpha-value>)",
                            "border-hover":"rgb(var(--ds-field-border-hover) / <alpha-value>)",
                            "border-focus":"rgb(var(--ds-field-border-focus) / <alpha-value>)",
                            "border-error":"rgb(var(--ds-field-border-error) / <alpha-value>)",
                        },
                        feedback: {
                            success: {
                                bg:         "rgb(var(--ds-feedback-success-bg) / <alpha-value>)",
                                border:     "rgb(var(--ds-feedback-success-border) / <alpha-value>)",
                                fg:         "rgb(var(--ds-feedback-success-fg) / <alpha-value>)",
                                "solid-bg": "rgb(var(--ds-feedback-success-solid-bg) / <alpha-value>)",
                                "solid-fg": "rgb(var(--ds-feedback-success-solid-fg) / <alpha-value>)",
                            },
                            warning: {
                                bg:         "rgb(var(--ds-feedback-warning-bg) / <alpha-value>)",
                                border:     "rgb(var(--ds-feedback-warning-border) / <alpha-value>)",
                                fg:         "rgb(var(--ds-feedback-warning-fg) / <alpha-value>)",
                                "solid-bg": "rgb(var(--ds-feedback-warning-solid-bg) / <alpha-value>)",
                                "solid-fg": "rgb(var(--ds-feedback-warning-solid-fg) / <alpha-value>)",
                            },
                            danger: {
                                bg:         "rgb(var(--ds-feedback-danger-bg) / <alpha-value>)",
                                border:     "rgb(var(--ds-feedback-danger-border) / <alpha-value>)",
                                fg:         "rgb(var(--ds-feedback-danger-fg) / <alpha-value>)",
                                "solid-bg": "rgb(var(--ds-feedback-danger-solid-bg) / <alpha-value>)",
                                "solid-fg": "rgb(var(--ds-feedback-danger-solid-fg) / <alpha-value>)",
                            },
                            info: {
                                bg:         "rgb(var(--ds-feedback-info-bg) / <alpha-value>)",
                                border:     "rgb(var(--ds-feedback-info-border) / <alpha-value>)",
                                fg:         "rgb(var(--ds-feedback-info-fg) / <alpha-value>)",
                                "solid-bg": "rgb(var(--ds-feedback-info-solid-bg) / <alpha-value>)",
                                "solid-fg": "rgb(var(--ds-feedback-info-solid-fg) / <alpha-value>)",
                            },
                            accent: {
                                bg:         "rgb(var(--ds-feedback-accent-bg) / <alpha-value>)",
                                border:     "rgb(var(--ds-feedback-accent-border) / <alpha-value>)",
                                fg:         "rgb(var(--ds-feedback-accent-fg) / <alpha-value>)",
                                "solid-bg": "rgb(var(--ds-feedback-accent-solid-bg) / <alpha-value>)",
                                "solid-fg": "rgb(var(--ds-feedback-accent-solid-fg) / <alpha-value>)",
                            },
                        },
                    },
                    fontFamily: {
                        sans: ["var(--ds-font-family-sans)"],
                        mono: ["var(--ds-font-family-mono)"],
                    },
                    borderRadius: {
                        none: "var(--ds-radius-none)",
                        sm:   "var(--ds-radius-sm)",
                        md:   "var(--ds-radius-md)",
                        lg:   "var(--ds-radius-lg)",
                        xl:   "var(--ds-radius-xl)",
                        full: "var(--ds-radius-full)",
                    },
                    boxShadow: {
                        sm:    "var(--ds-shadow-sm)",
                        md:    "var(--ds-shadow-md)",
                        lg:    "var(--ds-shadow-lg)",
                        xl:    "var(--ds-shadow-xl)",
                        focus: "var(--ds-shadow-focus)",
                    },
                },
            },
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgb(var(--ds-surface-sunken)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--ds-border-strong)); border-radius: var(--ds-radius-sm); }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--ds-text-muted)); }
    </style>
</head>

<body class="bg-surface-base text-text-primary font-sans h-screen flex overflow-hidden selection:bg-action-primary selection:text-action-primary-fg">

    <!-- ================================================================
         SIDEBAR (shared across all pages)
         ================================================================ -->
    <aside class="hidden md:flex flex-col w-64 h-full border-r border-border bg-surface-raised flex-shrink-0 z-30 shadow-sm">
        <!-- Logo -->
        <div class="p-6 pb-2">
            <div class="flex gap-3 items-center">
                <div class="bg-action-primary rounded-xl size-10 shadow-lg flex items-center justify-center">
                    <i data-lucide="building-2" class="size-5 text-action-primary-fg"></i>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-text-primary text-base font-bold leading-tight tracking-tight">SalesPro CRM</h1>
                    <p class="text-text-secondary text-xs font-normal">Gestão de Vendas</p>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav id="sidebar-nav" class="flex-1 flex flex-col gap-2 px-4 py-6 overflow-y-auto">
            <a class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors"
                href="#" data-nav="dashboard_home" data-icon="layout-dashboard">
                <i data-lucide="layout-dashboard" class="size-5"></i>
                <p class="text-sm font-medium">Dashboard</p>
            </a>
            <a class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors"
                href="#" data-nav="entidade_lista" data-icon="users">
                <i data-lucide="users" class="size-5"></i>
                <p class="text-sm font-medium">Leads</p>
            </a>
            <a class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors"
                href="#" data-nav="pipeline" data-icon="kanban">
                <i data-lucide="kanban" class="size-5"></i>
                <p class="text-sm font-medium">Pipeline</p>
            </a>
            <a class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors"
                href="#" data-nav="" data-icon="message-circle">
                <i data-lucide="message-circle" class="size-5"></i>
                <div class="flex flex-1 justify-between items-center">
                    <p class="text-sm font-medium">WhatsApp</p>
                    <span class="bg-feedback-success-solid-bg text-feedback-success-solid-fg text-[10px] font-bold px-1.5 py-0.5 rounded-full">3</span>
                </div>
            </a>

            <!-- Section divider -->
            <div class="mt-4 pt-4 border-t border-border">
                <p class="px-3 text-xs font-semibold text-text-muted uppercase tracking-wide mb-2">Relatórios</p>
                <a class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors"
                    href="#" data-nav="" data-icon="bar-chart-3">
                    <i data-lucide="bar-chart-3" class="size-5"></i>
                    <p class="text-sm font-medium">Desempenho</p>
                </a>
            </div>
        </nav>

        <!-- Logout -->
        <div class="p-4 border-t border-border">
            <button class="flex items-center gap-3 w-full px-3 py-2 rounded-lg hover:bg-surface-sunken transition-colors text-left group">
                <i data-lucide="log-out" class="size-5 text-text-secondary group-hover:text-action-ghost-fg"></i>
                <span class="text-text-secondary text-sm font-medium group-hover:text-action-ghost-fg">Sair</span>
            </button>
        </div>
    </aside>

    <!-- ================================================================
         MAIN CONTENT AREA
         ================================================================ -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-surface-base">

        <!-- ============================================================
             GLOBAL HEADER (hidden when pipeline is loaded)
             ============================================================ -->
        <header id="global-header" class="h-16 flex items-center justify-between px-6 border-b border-border bg-surface-raised/80 backdrop-blur-md sticky top-0 z-20">
            <!-- Mobile menu toggle -->
            <button class="md:hidden text-text-primary mr-4">
                <i data-lucide="menu" class="size-6"></i>
            </button>

            <!-- Search -->
            <div class="flex-1 max-w-md hidden sm:flex">
                <div class="relative w-full group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="size-5 text-text-secondary group-focus-within:text-action-primary transition-colors"></i>
                    </div>
                    <input
                        class="block w-full pl-10 pr-3 py-2 border border-field-border rounded-lg leading-5 bg-field text-field-fg placeholder:text-field-placeholder focus:outline-none focus:ring-1 focus:ring-field-border-focus focus:border-field-border-focus focus:bg-surface-raised text-sm transition-all shadow-sm"
                        placeholder="Buscar leads, empresas ou contratos..." type="text" />
                </div>
            </div>

            <!-- Right actions -->
            <div class="flex items-center gap-4 ml-4">
                <button class="relative p-2 text-text-secondary hover:text-action-ghost-fg transition-colors rounded-lg hover:bg-surface-sunken">
                    <i data-lucide="bell" class="size-5"></i>
                    <span class="absolute top-2 right-2 size-2 bg-feedback-danger-solid-bg rounded-full border-2 border-surface-raised"></span>
                </button>
                <button class="p-2 text-text-secondary hover:text-action-ghost-fg transition-colors rounded-lg hover:bg-surface-sunken">
                    <i data-lucide="settings" class="size-5"></i>
                </button>
                <div class="h-8 w-px bg-border mx-2"></div>
                <div class="flex items-center gap-3 cursor-pointer group">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium text-text-primary group-hover:text-action-ghost-fg transition-colors">Roberto Silva</p>
                        <p class="text-xs text-text-secondary">Executivo de Contas</p>
                    </div>
                    <div class="size-9 rounded-full bg-action-primary flex items-center justify-center text-action-primary-fg font-bold text-sm border-2 border-transparent group-hover:border-action-primary transition-all shadow-sm">
                        RS
                    </div>
                </div>
            </div>
        </header>

        <!-- ============================================================
             CONTENT SLOT — loaded via iframe (works on file:// protocol)
             ============================================================ -->
        <iframe id="content-frame" class="flex-1 w-full border-none" src="_conteudo/dashboard_home.html"></iframe>

    </main>

    <!-- ================================================================
         NAVIGATION ENGINE
         ================================================================ -->
    <script>
        // Pages that have their own header (global header should be hidden)
        const PAGES_WITH_OWN_HEADER = ['pipeline'];

        let currentPage = null;

        function loadPage(pageName) {
            if (!pageName) return;

            const frame = document.getElementById('content-frame');
            const globalHeader = document.getElementById('global-header');

            frame.src = `_conteudo/${pageName}.html`;

            // Toggle global header visibility
            if (PAGES_WITH_OWN_HEADER.includes(pageName)) {
                globalHeader.style.display = 'none';
            } else {
                globalHeader.style.display = '';
            }

            // Update active state in sidebar
            updateActiveNav(pageName);

            currentPage = pageName;
        }

        function updateActiveNav(pageName) {
            const INACTIVE = 'flex items-center gap-3 px-3 py-2.5 rounded-lg text-text-secondary hover:bg-surface-sunken hover:text-action-ghost-fg transition-colors';
            const ACTIVE = 'flex items-center gap-3 px-3 py-2.5 rounded-lg bg-action-primary/10 border border-action-primary/20 group transition-all hover:bg-action-primary/20';

            document.querySelectorAll('#sidebar-nav .nav-link').forEach(link => {
                const navTarget = link.getAttribute('data-nav');
                const icon = link.querySelector('[data-lucide]');
                const label = link.querySelector('p');

                if (navTarget === pageName) {
                    link.className = 'nav-link ' + ACTIVE;
                    if (icon) icon.classList.add('text-action-primary');
                    if (label) {
                        label.classList.add('text-action-primary');
                        label.classList.remove('text-text-secondary');
                    }
                } else {
                    link.className = 'nav-link ' + INACTIVE;
                    if (icon) icon.classList.remove('text-action-primary');
                    if (label) {
                        label.classList.remove('text-action-primary');
                    }
                }
            });
        }

        // Wire up sidebar nav clicks
        document.querySelectorAll('#sidebar-nav .nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const target = this.getAttribute('data-nav');
                if (target) loadPage(target);
            });
        });

        // Initialize Lucide icons for the shell
        lucide.createIcons();

        // Set initial active state for dashboard_home
        updateActiveNav('dashboard_home');
    </script>

</body>

</html>
