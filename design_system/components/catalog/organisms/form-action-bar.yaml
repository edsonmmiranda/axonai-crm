name: Form Action Bar
level: organism
description: Barra de ações no rodapé do formulário — Cancelar + Salvar alinhados à direita. Ações destrutivas (excluir) NÃO vivem aqui; usar Danger Zone Card como último bloco da tela na variante edit.
used_in:
  - form-create
  - form-edit

tokens_used: []

variants:
  - name: create
    description: Cancelar + Salvar alinhados à direita.
    code: |
      <div className="flex items-center justify-end gap-3 pt-2">
        <Button variant="secondary" href="leads.html">Cancelar</Button>
        <Button variant="primary" icon={Check} type="submit">Salvar Lead</Button>
      </div>

  - name: edit
    description: Cancelar + Salvar Alterações alinhados à direita. Mesmo layout do create — difere apenas no label do botão primário.
    code: |
      <div className="flex items-center justify-end gap-3 pt-2">
        <Button variant="secondary" href="leads.html">Cancelar</Button>
        <Button variant="primary" icon={Check} type="submit">Salvar Alterações</Button>
      </div>
