name: Pipeline Summary Card
level: organism
description: Card compacto que mostra o resumo visual do pipeline com barras de progresso por estágio. Versão dashboard do pipeline completo.
used_in:
  - dashboard

children:
  - pipeline-stage-bar

tokens_used:
  - bg-surface-raised
  - border-border
  - text-text-primary

variants:
  - name: default
    description: Card com título e lista de estágios com barras.
    code: |
      <div className="bg-surface-raised rounded-xl border border-border p-5 shadow-sm">
        <h3 className="text-lg font-bold text-text-primary mb-4">{title}</h3>
        <div className="flex flex-col gap-4">
          {stages.map(stage => (
            <PipelineStageBar
              key={stage.name}
              stageName={stage.name}
              count={stage.count}
              percent={stage.percent}
              stageColorClass={stage.colorClass}
            />
          ))}
        </div>
      </div>

notes: |
  Geralmente renderizado na coluna lateral (1/3) do dashboard.
  Mostra uma visão compacta do mesmo pipeline que o kanban board mostra em detalhe.
  Se o usuário clicar, deve navegar para a página de pipeline completa.
