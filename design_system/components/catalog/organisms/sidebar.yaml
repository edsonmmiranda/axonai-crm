name: Sidebar
level: organism
description: Painel lateral fixo com logo, navegação e logout. Reutilizado em todas as telas (exceto impressão).
used_in:
  - listing
  - form-create
  - form-edit
  - kanban

children:
  - logo-block
  - nav-item
  - section-label
  - divider

tokens_used:
  - border-border
  - bg-surface-raised
  - hover:bg-surface-sunken
  - text-text-secondary
  - hover:text-action-ghost-fg

variants:
  - name: default
    description: Sidebar completa com logo, nav items e botão logout.
    code: |
      <aside className="hidden md:flex flex-col w-64 h-full border-r border-border bg-surface-raised flex-shrink-0 z-30 shadow-sm">
        {/* Logo Block (molecule) */}
        <div className="p-6 pb-2"><LogoBlock /></div>

        {/* Navigation */}
        <nav className="flex-1 flex flex-col gap-2 px-4 py-6 overflow-y-auto">
          <NavItem icon={LayoutDashboard} label="Dashboard" />
          <NavItem icon={Users} label="Leads" active />
          <NavItem icon={Kanban} label="Pipeline" />
          <NavItem icon={MessageCircle} label="WhatsApp" badge={3} />
          <Divider />
          <SectionLabel>Relatórios</SectionLabel>
          <NavItem icon={BarChart3} label="Desempenho" />
        </nav>

        {/* Logout */}
        <div className="p-4 border-t border-border">
          <button className="flex items-center gap-3 w-full px-3 py-2 rounded-lg hover:bg-surface-sunken transition-colors text-left group">
            <LogOut className="size-5 text-text-secondary group-hover:text-action-ghost-fg" />
            <span className="text-text-secondary text-sm font-medium group-hover:text-action-ghost-fg">Sair</span>
          </button>
        </div>
      </aside>

notes: |
  Regra: o item ativo da sidebar deve corresponder à página atual.
  O href deve apontar para a rota correta do sistema.
