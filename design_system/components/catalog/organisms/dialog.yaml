name: Dialog
level: organism
description: Modal construído sobre Radix Dialog. Focus trap, escape e portal automáticos.
used_in:
  - listing
  - form-edit
  - kanban

children:
  - button

tokens_used:
  - bg-surface-inverse/60
  - bg-surface-overlay
  - text-text-primary
  - border-border
  - shadow-xl
  - text-text-secondary
  - text-text-muted

variants:
  - name: default
    description: Dialog com overlay, título, descrição e ações.
    code: |
      import * as DialogPrimitive from "@radix-ui/react-dialog";

      export const Dialog = DialogPrimitive.Root;
      export const DialogTrigger = DialogPrimitive.Trigger;

      export const DialogContent = forwardRef<
        React.ElementRef<typeof DialogPrimitive.Content>,
        React.ComponentPropsWithoutRef<typeof DialogPrimitive.Content>
      >(({ className, children, ...props }, ref) => (
        <DialogPrimitive.Portal>
          <DialogPrimitive.Overlay className="fixed inset-0 z-modal bg-surface-inverse/60 data-[state=open]:animate-in data-[state=open]:fade-in-0 data-[state=closed]:animate-out data-[state=closed]:fade-out-0" />
          <DialogPrimitive.Content
            ref={ref}
            className={cn(
              "fixed left-1/2 top-1/2 z-modal -translate-x-1/2 -translate-y-1/2",
              "w-full max-w-lg rounded-xl border border-border bg-surface-overlay p-6 shadow-xl",
              "text-text-primary",
              "data-[state=open]:animate-in data-[state=open]:fade-in-0 data-[state=open]:zoom-in-95",
              "data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=closed]:zoom-out-95",
              "duration-normal ease-standard",
              className
            )}
            {...props}
          >
            {children}
            <DialogPrimitive.Close className="absolute right-4 top-4 rounded-sm p-1 text-text-muted hover:text-text-primary transition-colors duration-fast">
              <X className="size-4" />
            </DialogPrimitive.Close>
          </DialogPrimitive.Content>
        </DialogPrimitive.Portal>
      ));

      export const DialogHeader = ({ className, ...props }: HTMLAttributes<HTMLDivElement>) => (
        <div className={cn("flex flex-col gap-1.5 mb-4", className)} {...props} />
      );

      export const DialogTitle = forwardRef<
        React.ElementRef<typeof DialogPrimitive.Title>,
        React.ComponentPropsWithoutRef<typeof DialogPrimitive.Title>
      >(({ className, ...props }, ref) => (
        <DialogPrimitive.Title ref={ref} className={cn("text-lg font-semibold text-text-primary", className)} {...props} />
      ));

      export const DialogDescription = forwardRef<
        React.ElementRef<typeof DialogPrimitive.Description>,
        React.ComponentPropsWithoutRef<typeof DialogPrimitive.Description>
      >(({ className, ...props }, ref) => (
        <DialogPrimitive.Description ref={ref} className={cn("text-sm text-text-secondary", className)} {...props} />
      ));

      export const DialogFooter = ({ className, ...props }: HTMLAttributes<HTMLDivElement>) => (
        <div className={cn("flex justify-end gap-3 mt-6", className)} {...props} />
      );

  - name: confirm-delete
    description: Dialog de confirmação de exclusão.
    code: |
      <Dialog>
        <DialogTrigger asChild>
          <Button variant="danger" size="sm"><Trash2 className="size-4" /> Excluir</Button>
        </DialogTrigger>
        <DialogContent>
          <DialogHeader>
            <DialogTitle>Confirmar exclusão</DialogTitle>
            <DialogDescription>Esta ação não pode ser desfeita. O registro será removido permanentemente.</DialogDescription>
          </DialogHeader>
          <DialogFooter>
            <DialogPrimitive.Close asChild><Button variant="secondary">Cancelar</Button></DialogPrimitive.Close>
            <Button variant="danger" onClick={onDelete}>Excluir</Button>
          </DialogFooter>
        </DialogContent>
      </Dialog>

notes: |
  NUNCA reimplementar dialog sem Radix. Focus trap, escape e click-outside
  são tratados automaticamente. Ver CONTRACT.md regra 2.
  Usar z-modal para empilhamento correto.
