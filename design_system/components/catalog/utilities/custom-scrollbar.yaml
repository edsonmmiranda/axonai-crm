name: Custom Scrollbar
level: utility
description: Estilização de scrollbar para áreas de conteúdo. Variante kanban-scroll mais fina.
used_in:
  - listing
  - form-create
  - form-edit
  - kanban

tokens_used:
  - "--ds-surface-sunken"
  - "--ds-border-strong"
  - "--ds-text-muted"
  - "--ds-radius-sm"
  - "--ds-radius-full"

variants:
  - name: default
    description: Scrollbar padrão (8px) para áreas com sidebar.
    code: |
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: rgb(var(--ds-surface-sunken)); }
      ::-webkit-scrollbar-thumb { background: rgb(var(--ds-border-strong)); border-radius: var(--ds-radius-sm); }
      ::-webkit-scrollbar-thumb:hover { background: rgb(var(--ds-text-muted)); }

  - name: kanban-scroll
    description: Scrollbar fina (6px) para listas de cards no kanban.
    code: |
      .kanban-scroll::-webkit-scrollbar { width: 6px; }
      .kanban-scroll::-webkit-scrollbar-track { background: transparent; }
      .kanban-scroll::-webkit-scrollbar-thumb { border-radius: var(--ds-radius-full); }
