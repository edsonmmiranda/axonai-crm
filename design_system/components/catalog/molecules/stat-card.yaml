name: Stat Card
level: molecule
description: Card de KPI com ícone decorativo, label, valor e trend badge.
used_in:
  - listing
  - dashboard

children:
  - trend-badge

tokens_used:
  - bg-surface-raised
  - border-border
  - hover:border-action-primary/30
  - text-action-primary
  - text-text-secondary
  - text-text-primary

variants:
  - name: default
    description: Card com ícone de fundo decorativo e trend badge.
    code: |
      <div className="bg-surface-raised rounded-xl p-5 border border-border shadow-sm hover:border-action-primary/30 transition-all relative overflow-hidden group">
        <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:opacity-10 transition-opacity">
          <Users className="size-16 text-action-primary" />
        </div>
        <div className="flex flex-col gap-1 relative z-10">
          <p className="text-text-secondary text-sm font-medium">{label}</p>
          <div className="flex items-baseline gap-2">
            <h3 className="text-3xl font-bold text-text-primary">{value}</h3>
            <TrendBadge direction="up" value="15%" />
          </div>
        </div>
      </div>
