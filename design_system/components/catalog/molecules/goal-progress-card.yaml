name: Goal Progress Card
level: molecule
description: Card de meta/objetivo com label, valor percentual, barra de progresso e texto auxiliar. Variante do stat-card focada em progresso.
used_in:
  - dashboard

children:
  - progress-bar

tokens_used:
  - bg-surface-raised
  - border-border
  - text-text-primary
  - text-text-secondary
  - bg-feedback-success-bg
  - text-feedback-success-fg
  - bg-surface-sunken
  - bg-action-primary

variants:
  - name: default
    description: Card com label, valor, ícone, barra de progresso e texto auxiliar.
    code: |
      <div className="bg-surface-raised border border-border rounded-xl p-6 flex flex-col justify-between shadow-sm">
        <div className="flex justify-between items-start">
          <div>
            <p className="text-text-secondary text-sm font-medium">{label}</p>
            <h4 className="text-2xl font-bold text-text-primary mt-1">{value}</h4>
          </div>
          <div className={cn("p-2 rounded-lg", intentBgClass)}>
            <Icon className={cn("size-5", intentFgClass)} />
          </div>
        </div>
        <div className="w-full bg-surface-sunken rounded-full h-2.5 mt-4">
          <div
            className="bg-action-primary h-2.5 rounded-full"
            style={{ width: `${percent}%` }}
          />
        </div>
        <p className="text-xs text-text-secondary mt-2">{helperText}</p>
      </div>

notes: |
  O ícone no canto superior direito usa cores de feedback para indicar o estado:
  - bg-feedback-success-bg + text-feedback-success-fg (meta positiva)
  - bg-feedback-warning-bg + text-feedback-warning-fg (meta em risco)
  - bg-feedback-danger-bg  + text-feedback-danger-fg  (meta atrasada)

  A barra de progresso usa o atom progress-bar (variante default).
  O helperText geralmente mostra quanto falta para atingir o objetivo.
